services:
  qwen-code-dev:
    image: ${IMAGE_TAG:-qwen-code-dev:0.17.1}
    container_name: ${CONTAINER_NAME:-qwen-dev}
    restart: unless-stopped
    stdin_open: true
    tty: true
    working_dir: /workspace
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
    volumes:
      - ${WORKSPACE_HOST_DIR:-/data/project}:/workspace
      - ${QWEN_HOME_DIR:-/data/qwen-home}:/root/.qwen
