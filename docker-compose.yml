services:
  qwen-code-dev:
    image: qwen-code-dev:0.13.1
    container_name: qwen-code-dev
    stdin_open: true
    tty: true
    working_dir: /workspace
    environment:
      LLM_API_BASE: ${LLM_API_BASE:?set_in_env_or_env_file}
      LLM_API_KEY: ${LLM_API_KEY:?set_in_env_or_env_file}
      LLM_MODEL: ${LLM_MODEL:?set_in_env_or_env_file}
      LLM_PROVIDER_NAME: ${LLM_PROVIDER_NAME:-OpenAI-Compatible Model}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
    volumes:
      - ${WORKSPACE_HOST_DIR:-.}:/workspace
      - ${QWEN_HOME_DIR:-./.qwen-home}:/root/.qwen
