services:
  qwen-code-dev:
    image: qwen-code-dev:0.13.0
    container_name: qwen-code-dev
    stdin_open: true
    tty: true
    working_dir: /workspace
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:?set_in_env_or_env_file}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
    volumes:
      - ${WORKSPACE_HOST_DIR:-.}:/workspace
      - ${QWEN_HOME_DIR:-./.qwen-home}:/root/.qwen
